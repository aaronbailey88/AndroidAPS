name: Build AndroidAPS APK (Signed)

on:
  workflow_dispatch:
    inputs:
      tagName:
        description: 'Select AAPS Version'
        required: true
        default: '3.4.2.2'
        type: choice
        options:
          - 3.4.2.2
          - 3.4.2.1
          - 3.4.2.0
          - 3.4.1.0
          - 3.4.0.0
          - 3.3.2.1
          - 3.3.2.0
          - 3.3.1.3
          - 3.2.0.4
          - 3.2.0.3

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout AndroidAPS
      - name: Checkout AndroidAPS
        uses: actions/checkout@v4
        with:
          repository: nightscout/AndroidAPS
          ref: ${{ github.event.inputs.tagName }}

      # Setup Java (AAPS 3.4+ needs Java 21)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Decode keystore from GitHub secret
      - name: Decode keystore
        run: |
          mkdir -p app
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

      # (Optional) sanity check
      - name: Verify keystore exists
        run: ls -lah app/

      # Build signed APK
      - name: Build signed APK
        run: ./gradlew assembleFullRelease
        env:
          ORG_GRADLE_PROJECT_android.injected.signing.store.file: ${{ github.workspace }}/app/keystore.jks
          ORG_GRADLE_PROJECT_android.injected.signing.store.password: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_android.injected.signing.key.alias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_android.injected.signing.key.password: ${{ secrets.KEY_PASSWORD }}

      # Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidaps-apk
          path: app/build/outputs/apk/full/release/*.apk
