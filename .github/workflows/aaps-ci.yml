name: Build AndroidAPS APK (Signed)

on:
  workflow_dispatch:
    inputs:
      tagName:
        description: 'Select AAPS Version'
        required: true
        default: '3.4.2.2'
        type: choice
        options:
          - 3.4.2.2
          - 3.4.2.1
          - 3.4.2.0
          - 3.4.1.0
          - 3.4.0.0
          - 3.3.2.1
          - 3.3.2.0
          - 3.3.1.3
          - 3.2.0.4
          - 3.2.0.3

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AndroidAPS
        uses: actions/checkout@v4
        with:
          repository: nightscout/AndroidAPS
          ref: ${{ github.event.inputs.tagName }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Enable Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      # 🔐 Decode keystore
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      # 🏗️ Build signed APK
      - name: Build signed APK
        run: |
          ./gradlew :app:assembleFullRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: androidaps-apk
          path: app/build/outputs/apk/full/release/*.apk
